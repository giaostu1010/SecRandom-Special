name: Release

"on":
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version (default: VERSION file)
        required: false
        type: string
      create_release:
        description: Create GitHub Release (default: false)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      version_no_v: ${{ steps.v.outputs.version_no_v }}
      changelog: ${{ steps.v.outputs.changelog }}
      create_release: ${{ steps.v.outputs.create_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve
        id: v
        shell: bash
        run: |
          set -euo pipefail

          create_release_input="${{ inputs.create_release }}"
          create_release="${create_release_input:-false}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            create_release=true
          fi

          version_input="${{ inputs.version }}"
          if [ -n "${version_input}" ]; then
            version="${version_input}"
          elif [ -n "${GITHUB_REF_NAME:-}" ]; then
            version="${GITHUB_REF_NAME}"
          elif [ -f VERSION ]; then
            version="$(cat VERSION | tr -d '\r\n\t ' )"
          else
            version="${GITHUB_SHA}"
          fi

          version_no_v="${version#v}"
          changelog="CHANGELOG/${version}/CHANGELOG.md"
          if [ "${create_release}" = "true" ] && [ ! -f "${changelog}" ]; then
            echo "Missing changelog: ${changelog}"
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${version_no_v}" >> "$GITHUB_OUTPUT"
          echo "changelog=${changelog}" >> "$GITHUB_OUTPUT"
          echo "create_release=${create_release}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish (${{ matrix.rid }})
    needs: [version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish
        run: >
          dotnet publish src/SecRandom.Avalonia/SecRandom.Avalonia.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o artifacts/SecRandom-${{ matrix.rid }}
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $versionNoV = "${{ needs.version.outputs.version_no_v }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $outFile = "dist/SecRandom-${versionNoV}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "artifacts/SecRandom-${{ matrix.rid }}/*" -DestinationPath $outFile -Force

      - name: Package (Linux deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${{ needs.version.outputs.version_no_v }}"
          mkdir -p dist

          pkgroot="$(pwd)/pkgroot"
          rm -rf "$pkgroot"
          mkdir -p "$pkgroot/DEBIAN"
          mkdir -p "$pkgroot/usr/lib/secrandom"
          mkdir -p "$pkgroot/usr/bin"
          mkdir -p "$pkgroot/usr/share/applications"
          mkdir -p "$pkgroot/usr/share/icons/hicolor/256x256/apps"

          cp -a "artifacts/SecRandom-${{ matrix.rid }}/." "$pkgroot/usr/lib/secrandom/"
          chmod +x "$pkgroot/usr/lib/secrandom/SecRandom" || true

          cat > "$pkgroot/usr/bin/secrandom" << 'EOF'
          #!/bin/sh
          exec /usr/lib/secrandom/SecRandom "$@"
          EOF
          chmod +x "$pkgroot/usr/bin/secrandom"

          cat > "$pkgroot/usr/share/applications/secrandom.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=SecRandom
          Exec=secrandom
          Icon=secrandom
          Categories=Utility;
          Terminal=false
          EOF

          if [ -f "src/SecRandom.Avalonia/Assets/icon/secrandom-icon-paper.png" ]; then
            cp "src/SecRandom.Avalonia/Assets/icon/secrandom-icon-paper.png" "$pkgroot/usr/share/icons/hicolor/256x256/apps/secrandom.png"
          fi

          cat > "$pkgroot/DEBIAN/control" << EOF
          Package: secrandom
          Version: ${version_no_v}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: SECTL
          Description: SecRandom
          EOF

          dpkg-deb --build "$pkgroot" "dist/SecRandom-${version_no_v}-${{ matrix.rid }}.deb"

      - name: Package (macOS pkg)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${{ needs.version.outputs.version_no_v }}"
          mkdir -p dist

          work="$(pwd)/macpkg"
          rm -rf "$work"
          mkdir -p "$work/bundle/SecRandom.app/Contents/MacOS"
          mkdir -p "$work/bundle/SecRandom.app/Contents/Resources"

          cp -a "artifacts/SecRandom-${{ matrix.rid }}/." "$work/bundle/SecRandom.app/Contents/MacOS/"
          chmod +x "$work/bundle/SecRandom.app/Contents/MacOS/SecRandom" || true

          cat > "$work/bundle/SecRandom.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>SecRandom</string>
            <key>CFBundleDisplayName</key><string>SecRandom</string>
            <key>CFBundleIdentifier</key><string>top.sectl.secrandom</string>
            <key>CFBundleVersion</key><string>${version_no_v}</string>
            <key>CFBundleShortVersionString</key><string>${version_no_v}</string>
            <key>CFBundleExecutable</key><string>SecRandom</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
          </dict>
          </plist>
          EOF

          icon_png="src/SecRandom.Avalonia/Assets/icon/secrandom-icon-paper.png"
          if [ -f "$icon_png" ]; then
            iconset="$work/AppIcon.iconset"
            mkdir -p "$iconset"
            for size in 16 32 64 128 256 512; do
              sips -z "$size" "$size" "$icon_png" --out "$iconset/icon_${size}x${size}.png" >/dev/null
            done
            for size in 16 32 128 256 512; do
              double=$((size*2))
              sips -z "$double" "$double" "$icon_png" --out "$iconset/icon_${size}x${size}@2x.png" >/dev/null
            done
            iconutil -c icns "$iconset" -o "$work/bundle/SecRandom.app/Contents/Resources/AppIcon.icns"
          fi

          pkgroot="$work/pkgroot"
          mkdir -p "$pkgroot/Applications"
          cp -a "$work/bundle/SecRandom.app" "$pkgroot/Applications/"

          pkgbuild \
            --root "$pkgroot" \
            --identifier "top.sectl.secrandom" \
            --version "$version_no_v" \
            --install-location "/" \
            "dist/SecRandom-${version_no_v}-${{ matrix.rid }}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecRandom-${{ matrix.rid }}
          path: dist/*

  notes:
    name: Generate notes
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.pkg' \) -print -exec cp -f {} release/ \;
          ls -la release

      - name: Generate release notes with SHA512
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.version.outputs.version }}"
          version_no_v="${{ needs.version.outputs.version_no_v }}"
          create_release="${{ needs.version.outputs.create_release }}"
          changelog_path="${{ needs.version.outputs.changelog }}"

          if [ "${create_release}" = "true" ] && [ -f "$changelog_path" ]; then
            cp "$changelog_path" release_notes.md
          else
            echo "# SecRandom ${version_no_v}" > release_notes.md
            echo "" >> release_notes.md
            echo "这是一次手动/测试构建，未创建 GitHub Release。" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## SHA512 校验" >> release_notes.md
          echo "" >> release_notes.md

          (cd release && sha512sum * > SHA512SUMS.txt)
          mv release/SHA512SUMS.txt SHA512SUMS.txt

          echo "| 文件 | SHA512 |" >> release_notes.md
          echo "| --- | --- |" >> release_notes.md
          while read -r hash file; do
            echo "| ${file} | ${hash} |" >> release_notes.md
          done < SHA512SUMS.txt

          mv SHA512SUMS.txt release/SHA512SUMS.txt

          if [ "${create_release}" = "true" ]; then
            echo "" >> release_notes.md
            echo "## 下载" >> release_notes.md
            echo "" >> release_notes.md
            echo "| 文件 | GitHub | SECTL高速 |" >> release_notes.md
            echo "| --- | --- | --- |" >> release_notes.md

            for f in release/*; do
              [ -f "$f" ] || continue
              file="$(basename "$f")"
              gh="https://github.com/${{ github.repository }}/releases/download/${version}/${file}"
              stk="https://stk.sectl.top/SecRandom/${version}/${file}"
              echo "| ${file} | [下载](${gh}) | [下载](${stk}) |" >> release_notes.md
            done
          fi

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release_notes.md
            release/SHA512SUMS.txt

  release:
    name: Create GitHub Release
    if: needs.version.outputs.create_release == 'true'
    needs: [version, publish, notes]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.pkg' -o -name 'SHA512SUMS.txt' \) -print -exec cp -f {} release/ \;
          ls -la release

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: notes

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: SecRandom ${{ needs.version.outputs.version_no_v }}
          body_path: notes/release_notes.md
          files: release/*
